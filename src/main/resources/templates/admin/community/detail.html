<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Chi tiết công thức – RecipeAdmin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--nav-h:64px;--nav-bg:#0f172a;--ac:#818cf8;--acd:#6366f1;--bg:#f4f5fb;--card:#fff;--bd:#e8eaf2;--sh:0 1px 3px rgba(0,0,0,.05),0 6px 20px rgba(0,0,0,.06);--t1:#0f172a;--t2:#5b6278;--t3:#9ca3af;--r:14px;--tr:.2s ease;--green:#10b981;--amber:#f59e0b;--red:#ef4444;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh;}
    .topnav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:var(--nav-bg);display:flex;align-items:center;padding:0 28px;box-shadow:0 4px 20px rgba(0,0,0,.25);}
    .nav-brand{display:flex;align-items:center;gap:10px;margin-right:36px;text-decoration:none;flex-shrink:0;}
    .nav-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--acd),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    .nb-text{font-size:15px;font-weight:800;color:#fff;} .nb-sub{font-size:10.5px;color:#64748b;}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nl{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;color:#94a3b8;font-size:13.5px;font-weight:500;text-decoration:none;transition:var(--tr);position:relative;}
    .nl:hover{background:rgba(255,255,255,.08);color:#e2e8f0;}
    .nl.active{background:rgba(129,140,248,.15);color:var(--ac);}
    .nl.active::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:2px;background:var(--ac);border-radius:2px 2px 0 0;}
    .nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
    .nav-sep{width:1px;height:20px;background:rgba(255,255,255,.1);}
    .n-admin{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.07);}
    .n-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acd),var(--ac));display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
    .n-name{font-size:12.5px;font-weight:600;color:#e2e8f0;}
    .n-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(239,68,68,.1);color:#f87171;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:var(--tr);}
    .n-logout:hover{background:rgba(239,68,68,.2);}
    .page-wrap{padding:28px 32px;}
    .page-head{display:flex;align-items:start;justify-content:space-between;margin-bottom:24px;}
    .pt{font-size:20px;font-weight:800;letter-spacing:-.3px;max-width:600px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pm{display:flex;gap:14px;margin-top:5px;font-size:13px;color:var(--t3);}
    .pm i{font-size:12px;}
    /* card */
    .pc{background:var(--card);border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);padding:24px;margin-bottom:20px;}
    .pc-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;}
    /* hero */
    .hero{width:100%;height:260px;object-fit:cover;border-radius:12px;margin-bottom:20px;}
    /* stat bar */
    .stat-row{display:flex;border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:22px;}
    .si{flex:1;padding:14px;text-align:center;}
    .si+.si{border-left:1px solid var(--bd);}
    .sv{font-size:18px;font-weight:700;}
    .sl{font-size:11.5px;color:var(--t3);margin-top:3px;}
    /* text */
    .sec-title{font-size:13.5px;font-weight:700;margin-bottom:7px;}
    .sec-body{font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-line;}
    /* form inputs */
    .fl{font-size:12.5px;font-weight:600;color:#374151;margin-bottom:6px;display:block;}
    .fi{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:13.5px;font-family:inherit;color:var(--t1);background:var(--card);transition:var(--tr);outline:none;}
    .fi:focus{border-color:var(--acd);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
    .bs{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,var(--acd),var(--ac));color:#fff;font-weight:700;font-size:13.5px;border:none;cursor:pointer;transition:var(--tr);width:100%;justify-content:center;}
    .bs:hover{filter:brightness(1.08);}
    /* reviews */
    .rev{padding:14px 0;border-bottom:1px solid #f3f4f8;}
    .rev:last-child{border-bottom:none;}
    .av-sm{width:32px;height:32px;border-radius:50%;object-fit:cover;}
    .del-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:#fef2f2;color:#dc2626;transition:var(--tr);}
    .del-btn:hover{background:#fee2e2;}
    .sp{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:#f8fafc;color:#64748b;}
    /* back btn */
    .btn-b{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;background:#f1f5f9;color:#64748b;border:1px solid var(--bd);transition:var(--tr);}
    .btn-b:hover{background:#e2e8f0;color:var(--t1);}
    /* toast */
    .toast-f{position:fixed;top:20px;right:24px;z-index:9999;background:#0f172a;color:#fff;padding:13px 18px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.25);display:flex;align-items:center;gap:9px;transition:opacity .4s;}
    .toast-f i{color:var(--green);}
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/admin/dashboard" class="nav-brand">
    <div class="nav-logo"><i class="fa-solid fa-bowl-food"></i></div>
    <div><div class="nb-text">RecipeAdmin</div><div class="nb-sub">Bảng quản trị</div></div>
  </a>
  <div class="nav-links">
    <a href="/admin/dashboard" class="nl"><i class="fa-solid fa-house"></i>Tổng quan</a>
    <a href="/admin/users" class="nl"><i class="fa-solid fa-users"></i>Người dùng</a>
    <a href="/admin/community" class="nl active"><i class="fa-solid fa-globe"></i>Duyệt công thức</a>
    <a href="/admin/reports" class="nl"><i class="fa-solid fa-flag"></i>Báo cáo vi phạm</a>
  </div>
  <div class="nav-right">
    <div class="nav-sep"></div>
    <div class="n-admin">
      <div class="n-av"><i class="fa-solid fa-user-tie" style="font-size:11px;"></i></div>
      <span class="n-name">Quản trị viên</span>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="n-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Đăng xuất</button>
    </form>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-head">
    <div>
      <div class="pt" th:text="${recipe.title}">Tên công thức</div>
      <div class="pm">
        <span><i class="fa-solid fa-user"></i> Người tạo: #<span th:text="${recipe.userId}"></span></span>
        <span><i class="fa-regular fa-clock"></i><span th:text="${recipe.createdAt}"></span></span>
      </div>
    </div>
    <a href="/admin/community" class="btn-b"><i class="fa-solid fa-arrow-left"></i>Quay lại</a>
  </div>

  <div class="row g-4">

    <!-- LEFT -->
    <div class="col-lg-7">
      <div class="pc">
        <img th:src="${recipe.imageUrl}" class="hero" alt="">
        <div class="stat-row">
          <div class="si"><div class="sv" th:text="${recipe.cookingTime} + ' ph'"></div><div class="sl"><i class="fa-regular fa-clock me-1"></i>Thời gian</div></div>
          <div class="si"><div class="sv" th:text="${recipe.servings}"></div><div class="sl"><i class="fa-solid fa-users me-1"></i>Khẩu phần</div></div>
          <div class="si"><div class="sv" th:text="${recipe.calories}"></div><div class="sl"><i class="fa-solid fa-fire me-1"></i>Kcal</div></div>
        </div>
        <div class="mb-4">
          <div class="sec-title">Nguyên liệu</div>
          <div class="sec-body" th:text="${recipe.ingredients}"></div>
        </div>
        <div>
          <div class="sec-title">Hướng dẫn thực hiện</div>
          <div class="sec-body" th:text="${recipe.instructions}"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-lg-5">

      <!-- Approval -->
      <div class="pc">
        <div class="pc-title">Quản lý trạng thái</div>
        <form th:action="@{'/admin/community/'+${recipe.id}+'/update'}" method="post">
          <div style="margin-bottom:14px;">
            <label class="fl">Trạng thái duyệt</label>
            <select id="ss" name="status" class="fi">
              <option value="PENDING"  th:selected="${recipe.shareStatus=='PENDING'}">Chờ duyệt</option>
              <option value="APPROVED" th:selected="${recipe.shareStatus=='APPROVED'}">Đã duyệt</option>
              <option value="REJECTED" th:selected="${recipe.shareStatus=='REJECTED'}">Từ chối</option>
            </select>
          </div>
          <div id="rb" style="margin-bottom:14px;display:none;">
            <label class="fl">Lý do từ chối</label>
            <textarea class="fi" style="resize:vertical;" name="reason" rows="3"
                      placeholder="Nhập lý do từ chối..." th:text="${recipe.shareRejectedReason}"></textarea>
          </div>
          <button type="submit" class="bs"><i class="fa-solid fa-floppy-disk"></i>Lưu thay đổi</button>
        </form>
      </div>

      <!-- Reviews -->
      <div class="pc">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div class="pc-title" style="margin-bottom:0;">Đánh giá &amp; Bình luận</div>
          <span th:if="${avgRating!=null}" style="font-size:13px;font-weight:700;">
            <i class="fa-solid fa-star" style="color:#f59e0b;font-size:11px;"></i>
            <span th:text="${#numbers.formatDecimal(avgRating,1,1)}"></span>
            <span style="color:var(--t3);font-weight:400;" th:text="'('+${totalReviews}+')'"></span>
          </span>
          <span th:if="${avgRating==null}" style="font-size:12px;color:var(--t3);">Chưa có đánh giá</span>
        </div>

        <div th:each="rev : ${reviews}" class="rev">
          <div class="d-flex gap-2 align-items-start">
            <img th:src="${rev.user!=null?rev.user.avatarUrl:'https://ui-avatars.com/api/?name=U&background=6366f1&color=fff'}"
                 class="av-sm" alt="">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <div>
                  <span style="font-weight:600;font-size:13px;" th:text="${rev.user!=null?rev.user.fullName:'Người dùng'}"></span>
                  <span th:if="${rev.parentId==null}" style="margin-left:5px;">
                    <span th:each="i : ${#numbers.sequence(1,5)}"
                          th:style="${i<=rev.rating}?'color:#f59e0b;font-size:11px;':'color:#e2e8f0;font-size:11px;'">&#9733;</span>
                  </span>
                  <span th:if="${rev.parentId!=null}" class="sp ms-1">Trả lời</span>
                </div>
                <form th:action="@{'/admin/community/'+${recipe.id}+'/reviews/'+${rev.id}+'/delete'}" method="post">
                  <button type="submit" class="del-btn" onclick="return confirm('Xóa bình luận này?')">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </form>
              </div>
              <div style="font-size:13px;color:var(--t2);margin-top:4px;" th:text="${rev.comment}"></div>
            </div>
          </div>
        </div>

        <div th:if="${reviews==null or reviews.isEmpty()}"
             style="text-align:center;padding:24px;color:var(--t3);font-size:13px;">
          <i class="fa-regular fa-comment-dots" style="font-size:24px;opacity:.2;display:block;margin-bottom:8px;"></i>
          Chưa có bình luận nào
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-f" th:if="${saved}" id="tf">
  <i class="fa-solid fa-circle-check"></i> Cập nhật thành công!
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const ss=document.getElementById('ss'),rb=document.getElementById('rb');
  function tog(){rb.style.display=ss.value==='REJECTED'?'block':'none';}
  tog(); ss.addEventListener('change',tog);
  const tf=document.getElementById('tf');
  if(tf) setTimeout(()=>{tf.style.opacity='0';},2500);
</script>
</body></html>
