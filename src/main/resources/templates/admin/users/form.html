<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title th:text="${mode=='create'?'Thêm người dùng':'Chỉnh sửa người dùng'}">Người dùng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--nav-h:64px;--nav-bg:#0f172a;--ac:#818cf8;--acd:#6366f1;--bg:#f4f5fb;--card:#fff;--bd:#e8eaf2;--sh:0 1px 3px rgba(0,0,0,.05),0 6px 20px rgba(0,0,0,.06);--t1:#0f172a;--t3:#9ca3af;--r:14px;--tr:.2s ease;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh;}
    .topnav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:var(--nav-bg);display:flex;align-items:center;padding:0 28px;gap:0;box-shadow:0 4px 20px rgba(0,0,0,.25);}
    .nav-brand{display:flex;align-items:center;gap:10px;margin-right:36px;text-decoration:none;flex-shrink:0;}
    .nav-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--acd),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    .nb-text{font-size:15px;font-weight:800;color:#fff;} .nb-sub{font-size:10.5px;color:#64748b;}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nl{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;color:#94a3b8;font-size:13.5px;font-weight:500;text-decoration:none;transition:var(--tr);position:relative;}
    .nl:hover{background:rgba(255,255,255,.08);color:#e2e8f0;}
    .nl.active{background:rgba(129,140,248,.15);color:var(--ac);}
    .nl.active::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:2px;background:var(--ac);border-radius:2px 2px 0 0;}
    .nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
    .nav-sep{width:1px;height:20px;background:rgba(255,255,255,.1);}
    .n-admin{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.07);}
    .n-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acd),var(--ac));display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
    .n-name{font-size:12.5px;font-weight:600;color:#e2e8f0;}
    .n-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(239,68,68,.1);color:#f87171;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:var(--tr);}
    .n-logout:hover{background:rgba(239,68,68,.2);}
    .page-wrap{padding:28px 32px;}
    .page-head{display:flex;align-items:start;justify-content:space-between;margin-bottom:24px;}
    .pt{font-size:22px;font-weight:800;letter-spacing:-.4px;} .ps{font-size:13px;color:var(--t3);margin-top:3px;}
    /* form card */
    .fc{background:var(--card);border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);padding:32px;}
    .fc-title{font-size:15px;font-weight:700;padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid var(--bd);}
    .fl{font-size:12.5px;font-weight:600;color:#374151;margin-bottom:6px;display:block;}
    .fh{font-size:11px;color:var(--t3);margin-left:5px;font-weight:400;}
    .fi{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:13.5px;font-family:inherit;color:var(--t1);background:var(--card);transition:var(--tr);outline:none;}
    .fi:focus{border-color:var(--acd);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
    .fi::placeholder{color:var(--t3);}
    /* buttons */
    .btn-a{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:10px;font-size:13.5px;font-weight:700;text-decoration:none;transition:var(--tr);border:none;cursor:pointer;}
    .bt-indigo{background:linear-gradient(135deg,var(--acd),var(--ac));color:#fff;} .bt-indigo:hover{filter:brightness(1.08);color:#fff;}
    .bt-ghost{background:#f1f5f9;color:#64748b;border:1px solid var(--bd);} .bt-ghost:hover{background:#e2e8f0;color:var(--t1);}
    .btn-b{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;background:#f1f5f9;color:#64748b;border:1px solid var(--bd);transition:var(--tr);}
    .btn-b:hover{background:#e2e8f0;color:var(--t1);}
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/admin/dashboard" class="nav-brand">
    <div class="nav-logo"><i class="fa-solid fa-bowl-food"></i></div>
    <div><div class="nb-text">RecipeAdmin</div><div class="nb-sub">Bảng quản trị</div></div>
  </a>
  <div class="nav-links">
    <a href="/admin/dashboard" class="nl"><i class="fa-solid fa-house"></i>Tổng quan</a>
    <a href="/admin/users" class="nl active"><i class="fa-solid fa-users"></i>Người dùng</a>
    <a href="/admin/community" class="nl"><i class="fa-solid fa-globe"></i>Duyệt công thức</a>
    <a href="/admin/reports" class="nl"><i class="fa-solid fa-flag"></i>Báo cáo vi phạm</a>
  </div>
  <div class="nav-right">
    <div class="nav-sep"></div>
    <div class="n-admin">
      <div class="n-av"><i class="fa-solid fa-user-tie" style="font-size:11px;"></i></div>
      <span class="n-name">Quản trị viên</span>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="n-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Đăng xuất</button>
    </form>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-head">
    <div>
      <div class="pt" th:text="${mode=='create'?'Thêm người dùng mới':'Chỉnh sửa tài khoản'}"></div>
      <div class="ps">Quản lý thông tin tài khoản người dùng hệ thống</div>
    </div>
    <a href="/admin/users" class="btn-b"><i class="fa-solid fa-arrow-left"></i>Quay lại</a>
  </div>

  <div class="fc">
    <div class="fc-title" th:text="${mode=='create'?'Thông tin tài khoản mới':'Cập nhật thông tin'}"></div>
    <form th:action="@{${mode=='create'?'/admin/users/create':'/admin/users/'+user.id+'/edit'}}"
          th:object="${user}" method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="fl">Họ tên <span style="color:#ef4444;">*</span></label>
          <input type="text" class="fi" th:field="*{fullName}" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="col-md-6">
          <label class="fl">Email <span style="color:#ef4444;">*</span></label>
          <input type="email" class="fi" th:field="*{email}" placeholder="example@email.com" required>
        </div>
        <div class="col-md-6">
          <label class="fl">Mật khẩu <span class="fh" th:if="${mode=='edit'}">(để trống để giữ nguyên)</span></label>
          <input type="text" class="fi" th:field="*{password}" placeholder="Nhập mật khẩu...">
        </div>
        <div class="col-md-3">
          <label class="fl">Vai trò</label>
          <select class="fi" th:field="*{role}">
            <option value="USER">Người dùng</option>
            <option value="ADMIN">Quản trị viên</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="fl">Trạng thái</label>
          <select class="fi" th:field="*{status}">
            <option value="ACTIVE">Hoạt động</option>
            <option value="BLOCKED">Bị khóa</option>
          </select>
        </div>
        <div class="col-12">
          <label class="fl">Đường dẫn ảnh đại diện</label>
          <input type="text" class="fi" th:field="*{avatarUrl}" placeholder="https://...">
        </div>
        <div class="col-12">
          <label class="fl">Ghi chú</label>
          <textarea class="fi" style="resize:vertical;" rows="3" th:field="*{note}" placeholder="Ghi chú tuỳ chọn..."></textarea>
        </div>
      </div>
      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn-a bt-indigo">
          <i class="fa-solid fa-floppy-disk"></i>Lưu lại
        </button>
        <a href="/admin/users" class="btn-a bt-ghost">Hủy</a>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
