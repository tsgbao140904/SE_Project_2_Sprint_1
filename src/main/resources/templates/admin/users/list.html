<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Người dùng – RecipeAdmin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--nav-h:64px;--nav-bg:#0f172a;--ac:#818cf8;--acd:#6366f1;--bg:#f4f5fb;--card:#fff;--bd:#e8eaf2;--sh:0 1px 3px rgba(0,0,0,.05),0 6px 20px rgba(0,0,0,.06);--t1:#0f172a;--t2:#5b6278;--t3:#9ca3af;--r:14px;--tr:.2s ease;--green:#10b981;--red:#ef4444;--amber:#f59e0b;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh;}
    /* topnav */
    .topnav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:var(--nav-bg);display:flex;align-items:center;padding:0 28px;gap:0;box-shadow:0 4px 20px rgba(0,0,0,.25);}
    .nav-brand{display:flex;align-items:center;gap:10px;margin-right:36px;text-decoration:none;flex-shrink:0;}
    .nav-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--acd),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    .nb-text{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;}
    .nb-sub{font-size:10.5px;color:#64748b;}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nl{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;color:#94a3b8;font-size:13.5px;font-weight:500;text-decoration:none;transition:var(--tr);position:relative;}
    .nl i{font-size:13px;}
    .nl:hover{background:rgba(255,255,255,.08);color:#e2e8f0;}
    .nl.active{background:rgba(129,140,248,.15);color:var(--ac);}
    .nl.active::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:2px;background:var(--ac);border-radius:2px 2px 0 0;}
    .nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
    .nav-sep{width:1px;height:20px;background:rgba(255,255,255,.1);}
    .n-admin{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.07);}
    .n-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acd),var(--ac));display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
    .n-name{font-size:12.5px;font-weight:600;color:#e2e8f0;}
    .n-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(239,68,68,.1);color:#f87171;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:var(--tr);}
    .n-logout:hover{background:rgba(239,68,68,.2);}
    /* page */
    .page-wrap{padding:28px 32px;}
    .page-head{display:flex;align-items:start;justify-content:space-between;margin-bottom:24px;}
    .pt{font-size:22px;font-weight:800;letter-spacing:-.4px;} .ps{font-size:13px;color:var(--t3);margin-top:3px;}
    /* card */
    .sc{background:var(--card);border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden;}
    .sc-head{padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
    .sc-title{font-size:14px;font-weight:700;} .sc-meta{font-size:12px;color:var(--t3);}
    /* table */
    .dt{width:100%;border-collapse:collapse;}
    .dt thead th{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:10px 16px;border-bottom:1px solid var(--bd);background:#fafbfc;white-space:nowrap;}
    .dt tbody td{padding:12px 16px;border-bottom:1px solid #f3f4f8;font-size:13.5px;vertical-align:middle;}
    .dt tbody tr:last-child td{border-bottom:none;}
    .dt tbody tr:hover td{background:#f7f8ff;}
    /* pills */
    .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;}
    .p-purple{background:#faf5ff;color:#7c3aed;} .p-slate{background:#f8fafc;color:#64748b;}
    /* buttons */
    .btn-a{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;text-decoration:none;transition:var(--tr);border:none;cursor:pointer;}
    .bt-indigo{background:linear-gradient(135deg,var(--acd),var(--ac));color:#fff;} .bt-indigo:hover{filter:brightness(1.08);color:#fff;}
    .bt-amber{background:#fffbeb;color:#b45309;} .bt-amber:hover{background:#fef3c7;}
    .bt-red{background:#fef2f2;color:#dc2626;} .bt-red:hover{background:#fee2e2;}
    /* pagination */
    .pager{padding:14px 22px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
    .pi{font-size:12px;color:var(--t3);}
    .pager-btns{display:flex;gap:4px;}
    .pb{padding:5px 11px;border-radius:7px;font-size:12.5px;font-weight:600;border:1px solid var(--bd);background:var(--card);color:var(--t2);text-decoration:none;transition:var(--tr);}
    .pb:hover{background:#f0f4ff;border-color:var(--acd);color:var(--acd);}
    .pb.active{background:var(--acd);border-color:var(--acd);color:#fff;}
    .pb.disabled{opacity:.4;pointer-events:none;}
    /* avatar */
    .av{border-radius:50%;object-fit:cover;width:34px;height:34px;}
    /* alert */
    .flash{padding:12px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:16px;}
    .flash-ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;}
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/admin/dashboard" class="nav-brand">
    <div class="nav-logo"><i class="fa-solid fa-bowl-food"></i></div>
    <div><div class="nb-text">RecipeAdmin</div><div class="nb-sub">Bảng quản trị</div></div>
  </a>
  <div class="nav-links">
    <a href="/admin/dashboard" class="nl"><i class="fa-solid fa-house"></i>Tổng quan</a>
    <a href="/admin/users" class="nl active"><i class="fa-solid fa-users"></i>Người dùng</a>
    <a href="/admin/community" class="nl"><i class="fa-solid fa-globe"></i>Duyệt công thức</a>
    <a href="/admin/reports" class="nl"><i class="fa-solid fa-flag"></i>Báo cáo vi phạm</a>
  </div>
  <div class="nav-right">
    <div class="nav-sep"></div>
    <div class="n-admin">
      <div class="n-av"><i class="fa-solid fa-user-tie" style="font-size:11px;"></i></div>
      <span class="n-name">Quản trị viên</span>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="n-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Đăng xuất</button>
    </form>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-head">
    <div><div class="pt">Quản lý người dùng</div><div class="ps">Danh sách tài khoản trong hệ thống</div></div>
    <a href="/admin/users/create" class="btn-a bt-indigo">
      <i class="fa-solid fa-plus"></i>Thêm người dùng
    </a>
  </div>

  <div th:if="${saved}" class="flash flash-ok">
    <i class="fa-solid fa-circle-check"></i><span th:text="${saved}"></span>
  </div>

  <div class="sc">
    <div class="sc-head">
      <span class="sc-title">Danh sách tài khoản</span>
      <span class="sc-meta" th:text="'Tổng ' + ${users.totalElements} + ' tài khoản'"></span>
    </div>
    <table class="dt">
      <thead>
        <tr>
          <th>ID</th><th>Người dùng</th><th>Email</th>
          <th>Vai trò</th><th>Ngày tạo</th>
          <th style="text-align:right;">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td style="color:var(--t3);font-size:12px;" th:text="${u.id}"></td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <img th:src="${u.avatarUrl}" class="av" alt="">
              <span style="font-weight:600;" th:text="${u.fullName}"></span>
            </div>
          </td>
          <td style="color:var(--t3);font-size:12.5px;" th:text="${u.email}"></td>
          <td>
            <span class="pill p-purple" th:if="${u.role == 'ADMIN'}"><i class="fa-solid fa-shield-halved" style="font-size:10px;"></i>Quản trị</span>
            <span class="pill p-slate"  th:if="${u.role == 'USER'}"><i class="fa-regular fa-circle-user" style="font-size:10px;"></i>Người dùng</span>
          </td>
          <td style="color:var(--t3);font-size:12.5px;" th:text="${#dates.format(u.createdAt,'dd/MM/yyyy')}"></td>
          <td style="text-align:right;">
            <div class="d-flex justify-content-end gap-1">
              <a th:href="@{'/admin/users/' + ${u.id} + '/edit'}" class="btn-a bt-amber" style="padding:6px 12px;font-size:12.5px;">
                <i class="fa-solid fa-pen-to-square"></i>Sửa
              </a>
              <a th:href="@{'/admin/users/' + ${u.id} + '/delete'}"
                 onclick="return confirm('Xóa tài khoản này?')"
                 class="btn-a bt-red" style="padding:6px 12px;font-size:12.5px;">
                <i class="fa-solid fa-trash"></i>Xóa
              </a>
            </div>
          </td>
        </tr>
        <tr th:if="${users.isEmpty()}">
          <td colspan="6" style="text-align:center;padding:40px;color:var(--t3);">
            <i class="fa-solid fa-users" style="font-size:26px;opacity:.2;display:block;margin-bottom:8px;"></i>Không có người dùng nào
          </td>
        </tr>
      </tbody>
    </table>
    <div class="pager" th:if="${users.totalPages > 1}">
      <span class="pi" th:text="'Trang ' + (${currentPage}+1) + ' / ' + ${users.totalPages}"></span>
      <div class="pager-btns">
        <a th:classappend="${currentPage==0} ? 'pb disabled':'pb'" th:href="@{/admin/users(page=${currentPage-1})}"><i class="fa-solid fa-chevron-left"></i></a>
        <a th:each="i : ${#numbers.sequence(0,users.totalPages-1)}" th:classappend="${i==currentPage}?'pb active':'pb'" th:text="${i+1}" th:href="@{/admin/users(page=${i})}"></a>
        <a th:classappend="${currentPage+1>=users.totalPages}?'pb disabled':'pb'" th:href="@{/admin/users(page=${currentPage+1})}"><i class="fa-solid fa-chevron-right"></i></a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
